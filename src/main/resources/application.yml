spring:
  application:
    name: INTELLI-TUTOR

  ai:
    google:
      genai:
        api-key: ${API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
        embedding:
          api-key: ${API_KEY}
          text:
            options:
              model: gemini-embedding-001

  datasource:
    url: jdbc:mysql://localhost:3306/Intelli_tutor
    username: ${SQL_USERNAME}
    password: ${SQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always

server:
  port: 8081